name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: validate skill
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify required tools
        run: |
          jq --version
          perl --version | head -2
          bash --version | head -1

      - name: Install pytest (apply-and-test.sh fixture runner)
        run: pip install --quiet pytest

      - name: Validate frontmatter
        run: bash scripts/validate-frontmatter.sh SKILL.md

      - name: Validate content
        run: bash scripts/validate-skill-content.sh SKILL.md

      - name: Unit tests (pick-model + audit-models)
        run: bash tests/run-tests.sh

      - name: Validate-frontmatter tests
        run: bash tests/test-validate-frontmatter.sh

      - name: Validate-content tests
        run: bash tests/test-validate-content.sh

      - name: Delegate.sh tests
        run: bash tests/test-delegate.sh

      - name: Metrics-summary tests
        run: bash tests/test-metrics-summary.sh

      - name: Delegate-feedback tests
        run: bash tests/test-delegate-feedback.sh

      - name: Run-api-cell tests
        run: bash tests/test-run-api-cell.sh

      - name: Score-t3 tests
        run: bash tests/test-score-t3.sh

      - name: Runner argument-parsing tests
        run: bash tests/test-runner.sh

      - name: Apply-and-test tests
        run: bash tests/test-apply-and-test.sh

      - name: Eval-skill-triggers tests
        run: bash tests/test-eval-skill-triggers.sh

      - name: Eval-set shape
        run: bash scripts/eval-skill-triggers.sh

      - name: Trigger eval (GitHub Models)
        # Advisory, not blocking: GitHub Models free tier is 150 RPD on the
        # low-rate-limit bucket and 23 queries per run, so ~6 PR runs/day
        # exhaust the quota and the rest hang on long Retry-After. Until
        # skip-when-unchanged + batched scoring lands (issue #62), let CI
        # pass even when the gate can't run, and bound the wait so a hang
        # surfaces fast instead of stalling the workflow.
        continue-on-error: true
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/eval-skill-triggers.sh --github-models

      - name: Trigger eval (Anthropic API, opt-in)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not configured; skipping API-mode trigger eval"
            exit 0
          fi
          bash scripts/eval-skill-triggers.sh --api

  mcp-server:
    name: mcp server (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        working-directory: mcp
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: mcp
        run: pytest -q
