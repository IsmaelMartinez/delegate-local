# Local on-device observability for delegate-local: Tempo (trace store +
# TraceQL metrics) and Grafana (the three committed dashboards). No SaaS
# account, no data leaves the workstation. See docs/observability/grafana-local.md.
#
#   docker compose -f observability/docker-compose.yml up -d
#   open http://localhost:3001        # Grafana, anonymous admin, no login
#
# Tempo binds the OTLP ports (4317/4318) so the default
# DELEGATE_OTEL_ENDPOINT=http://localhost:4318/v1/traces routes here unchanged.
# If a Phoenix / otel-collector stack already holds those ports, stop it first
# (the runbook covers the swap and a port-remap alternative).
name: delegate-local-observability

services:
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      # Loopback-only: telemetry stays on the workstation, not exposed to the LAN.
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP  (delegate.sh default target)
      - "127.0.0.1:3200:3200"   # Tempo query API
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      # Loopback-only: the sync script (scripts/sync-metrics-to-loki.sh) pushes
      # the metrics JSONL here so the dashboards can chart the full history.
      - "127.0.0.1:3100:3100"   # Loki HTTP (push + query)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - tempo
      - loki
    environment:
      # Frictionless local access: anonymous admin, no login form, no account.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # TraceQL metrics querying is gated behind this feature toggle.
      GF_FEATURE_TOGGLES_ENABLE: "traceqlMetrics"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana/dashboards-provider.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ../dashboards/grafana:/etc/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Loopback-only: anonymous-admin Grafana must not be reachable from the LAN.
      - "127.0.0.1:3001:3000"   # host 3001 → Grafana (3000 is commonly already in use)
    restart: unless-stopped

volumes:
  tempo-data:
  loki-data:
  grafana-data:
