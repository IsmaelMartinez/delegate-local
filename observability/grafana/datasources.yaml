apiVersion: 1

# Tempo datasource. The uid MUST stay "tempo" — every panel in
# dashboards/grafana/*.json references datasource.uid="tempo", and
# tests/test-dashboards.sh pins that contract.
datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      # Search streaming returns Tempo's incremental job-progress frames, which
      # Grafana's Tempo panel renders as the table body (State / Elapsed / Jobs
      # columns) instead of the matched spans. Disable it so search/table panels
      # render the result set. Metric panels are unaffected (separate endpoint).
      streamingEnabled:
        search: false

  # Loki datasource. The uid MUST stay "loki" — every committed dashboard panel
  # references datasource.uid="loki", and tests/test-dashboards.sh pins that
  # contract. Loki holds the metrics JSONL history (pushed by
  # scripts/sync-metrics-to-loki.sh) so the dashboards chart the full window.
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 2000
